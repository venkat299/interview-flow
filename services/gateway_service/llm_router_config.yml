providers:
  # Local OpenAI-compatible server (e.g., LM Studio, Ollama, vLLM, OpenAI-compatible proxy)
  local:
    base_url: https://1175be4d9760.ngrok-free.app/v1/chat/completions
    api_key: ""
    model: openai/gpt-oss-20b
    # Keep responses bounded and faster; tweak as needed
    max_tokens: 512
    temperature: 0.7
    # Allow slower local model responses without failing the request
    timeout: 120

  # Optional: keep OpenAI config for fallback/manual switching
  openai:
    base_url: https://api.openai.com/v1/chat/completions
    api_key: dummy-key
    model: gpt-3.5-turbo

tasks:
  blueprint_generation:
    provider: local
  question_generation:
    provider: local
  answer_evaluation:
    provider: local
  # Heavier tasks used by the app-test endpoints
  fake_candidate_profile:
    provider: local
    # Slightly higher timeout for initial profile generation
    timeout: 150
    max_tokens: 700
  fake_candidate_resume:
    provider: local
    timeout: 120
    max_tokens: 400
