providers:
  # Local OpenAI-compatible server (e.g., LM Studio, Ollama, vLLM, OpenAI-compatible proxy)
  local:
    base_url: https://6311e26c90cd.ngrok-free.app/v1/chat/completions
    api_key: ""
    model: openai/gpt-oss-20b
    # Optional generation controls (disabled by request)
    # max_tokens: 512
    temperature: 1.0
    # timeout: 120

  # Dedicated auto-answering model. Override AUTO_LLM_URL/ AUTO_LLM_MODEL to
  # point at a different LLM endpoint without editing this file.
  auto_answer:
    base_url: https://6311e26c90cd.ngrok-free.app/v1/chat/completions
    api_key: ""
    model: dpo-qwen2-1.5b-instruct-human-like
    temperature: 0.8

  # Google AI Studio Gemini provider (uses generateContent endpoint)
  gemini:
    base_url: https://generativelanguage.googleapis.com/v1/models
    model: gemini-2.5-flash

  # Optional: keep OpenAI config for fallback/manual switching
  # openai:
  #   base_url: https://api.openai.com/v1/chat/completions
  #   api_key: dummy-key
  #   model: gpt-3.5-turbo

tasks:
  blueprint_generation:
    provider: local
  question_generation:
    provider: local
  answer_evaluation:
    provider: local
  auto_answer_generation:
    provider: gemini
  # Heavier tasks used by the app-test endpoints
  fake_candidate_profile:
    provider: local
    # timeout: 150
    # max_tokens: 700
  fake_candidate_resume:
    provider: local
    # timeout: 120
    # max_tokens: 400
