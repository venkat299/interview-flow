# In interview-flow-dev/docker-compose.yml

services:
  ai_orchestration_service:
    build:
      context: ./services/ai_orchestration_service
      dockerfile: Dockerfile
    ports:
      - "8003:8000"
    volumes:
      - ./services/ai_orchestration_service:/code/ai_orchestration_service
    command: uvicorn ai_orchestration_service.app.main:app --host 0.0.0.0 --port 8000 --reload

  interview_session_service:
    build:
      context: ./services/interview_session_service
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    environment:
      # Use service name + container port for intra-network calls
      - AI_SERVICE_URL=http://ai_orchestration_service:8000
      # Increase request timeout to tolerate slower LLM responses
      - AI_TIMEOUT=60
    volumes:
      - ./services/interview_session_service:/code/interview_session_service
    command: uvicorn interview_session_service.app.main:app --host 0.0.0.0 --port 8000 --reload
