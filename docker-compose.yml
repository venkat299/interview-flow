# In interview-flow-dev/docker-compose.yml

services:
  api_service:
    build:
      context: .
      dockerfile: services/api_service/Dockerfile
    environment:
      PYTHONPATH: /code/services
      # Enable granular call tracing in app logs
      LOG_LEVEL: TRACE
      TRACE_CALLS: "true"
      # Trace all repo user code under services/
      TRACE_FILE_PATH_CONTAINS: services/
      # Print concise trace lines (CALL/RET only)
      TRACE_CONCISE: "true"
      # Allow more time for slow local LLMs
      LLM_TIMEOUT: "120"
      LLM_CONNECT_TIMEOUT: "20"
    ports:
      - "8003:8000"
    volumes:
      - .:/code
    command: uvicorn api_service.app.main:app --host 0.0.0.0 --port 8000 --reload
