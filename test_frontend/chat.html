<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interview Test Client</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container my-4">
        <div class="d-flex justify-content-end mb-2">
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="auto-toggle">
                <label class="form-check-label" for="auto-toggle">Auto-Answer (test)</label>
            </div>
        </div>
        <div id="persona-box" class="mb-3">
            <label for="persona-select" class="form-label">LLM Persona</label>
            <select id="persona-select" class="form-select w-auto">
                <option value="friendly_mentor">Friendly Mentor</option>
                <option value="strict_examiner">Strict Examiner</option>
                <option value="casual_peer">Casual Peer</option>
            </select>
        </div>

        <div id="auto-controls" class="card card-body py-2 mb-3 d-none">
            <div class="row g-3 align-items-start">
                <div class="col-md-4">
                    <label for="confidence-select" class="form-label mb-1">Confidence</label>
                    <select id="confidence-select" class="form-select form-select-sm">
                        <option value="High">High</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="Low">Low</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="verbosity-select" class="form-label mb-1">Verbosity</label>
                    <select id="verbosity-select" class="form-select form-select-sm">
                        <option value="Concise">Concise</option>
                        <option value="Balanced" selected>Balanced</option>
                        <option value="Verbose">Verbose</option>
                    </select>
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <div class="form-check ms-auto">
                        <input class="form-check-input" type="checkbox" id="auto-send">
                        <label class="form-check-label" for="auto-send">Auto-send answers</label>
                    </div>
                </div>
                <div class="col-12">
                    <label class="form-label mb-1">Skill Matrix</label>
                    <div id="skill-matrix-container"></div>
                    <div class="d-flex align-items-center mt-2">
                        <button id="reload-skill-matrix" class="btn btn-sm btn-outline-secondary me-2" type="button">Reload from profile</button>
                        <div class="form-text">Use sliders to adjust proficiency (1–10). Prefills from candidate profile when available.</div>
                    </div>
                </div>
                <div class="col-12 d-flex justify-content-end">
                    <button id="auto-generate" class="btn btn-outline-primary btn-sm">Generate Answer</button>
                </div>
            </div>
        </div>

        <div id="metrics-box" class="mb-3">
            <span>Interview Time: <span id="interview-timer">00:00</span></span>
            <span class="ms-3">Words: <span id="word-counter">0</span></span>
            <span class="ms-3">Turn Time: <span id="turn-timer">00:00</span></span>
        </div>

        <div class="card">
            <div id="chat-log" class="card-body overflow-auto" style="height: 400px;"></div>
            <div class="card-footer">
                <div id="status-indicator" class="small text-muted mb-2">
                    <span id="status-spinner" class="spinner-border spinner-border-sm me-2 d-none" role="status" aria-hidden="true"></span>
                    <span id="status-text">Connecting...</span>
                </div>
                <div class="input-group">
                    <input type="text" id="chat-input" class="form-control" placeholder="Type your answer here..." disabled>
                    <button id="send-button" class="btn btn-primary" disabled>Send</button>
                    <button id="skip-button" class="btn btn-secondary" disabled>Skip Question</button>
                    <button id="end-button" class="btn btn-danger" disabled>End Interview</button>
                    <button id="report-button" class="btn btn-success" disabled>Download Report</button>
                </div>
            </div>
        </div>

        <div id="rubric-box" class="card mt-3">
            <div class="card-header">Rubric &amp; Score</div>
            <div id="rubric-body" class="card-body">
                <p class="text-muted mb-0">No answers evaluated yet.</p>
            </div>
        </div>

        <div id="log-box" class="card mt-3">
            <div class="card-header">Interview Log</div>
            <div id="log-body" class="card-body overflow-auto" style="height: 200px;"></div>
        </div>

        <div id="summary-box" class="card mt-3">
            <div class="card-header">Topic Strengths</div>
            <div id="summary-body" class="card-body">
                <p class="text-muted mb-0">No topic evaluations yet.</p>
            </div>
        </div>

        <div id="stats-box" class="card mt-3">
            <div class="card-header">Question Stats</div>
            <div id="stats-body" class="card-body"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="chat.js"></script>
</body>
</html>
