<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Start Interview</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container py-5">
        <div class="card p-4 mx-auto" style="max-width: 600px;">
            <select id="prefill-select" class="form-select mb-3">
                <option value="">-- Select sample data --</option>
            </select>

            <select id="limit-select" class="form-select mb-3">
                <option value="900" data-words="1500">15 minutes</option>
                <option value="1200" data-words="2000">20 minutes</option>
                <option value="1500" data-words="2500">25 minutes</option>
                <option value="1800" data-words="3000">30 minutes</option>
            </select>

            <textarea id="job-description" class="form-control mb-3" placeholder="Job description"></textarea>
            <textarea id="resume" class="form-control mb-3" placeholder="Paste your resume here"></textarea>
            <button id="start-button" class="btn btn-primary w-100">Start Interview</button>
        </div>

        <div class="card p-4 mx-auto mt-4" style="max-width: 600px;">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h5 class="mb-0">Past Sessions</h5>
                <button id="refresh-sessions" class="btn btn-sm btn-outline-secondary">Refresh</button>
            </div>
            <div id="sessions-container" class="list-group small"></div>
        </div>
    </div>
    <script>

    const AI_SERVICE_URL = 'http://localhost:8003';
    // Share with chat page
    try { sessionStorage.setItem('AI_SERVICE_URL', AI_SERVICE_URL); } catch (e) {}
    const select = document.getElementById('prefill-select');
    const sessionsContainer = document.getElementById('sessions-container');
    const refreshBtn = document.getElementById('refresh-sessions');

    async function loadSamples() {
        try {
            const resp = await fetch(`${AI_SERVICE_URL}/samples`);
            const data = await resp.json();
            const items = data.items || [];
            for (const item of items) {
                const opt = document.createElement('option');
                opt.value = item.key;
                opt.textContent = item.title;
                select.appendChild(opt);
            }
        } catch (e) {
            console.error('Failed to load samples', e);
        }
    }

    select.addEventListener('change', async () => {
        const key = select.value;
        if (!key) {
            document.getElementById('job-description').value = '';
            document.getElementById('resume').value = '';
            return;
        }
        try {
            const resp = await fetch(`${AI_SERVICE_URL}/samples/${encodeURIComponent(key)}`);
            const item = await resp.json();
            document.getElementById('job-description').value = item.job_description || '';
            document.getElementById('resume').value = item.resume || '';
        } catch (e) {
            console.error('Failed to load sample', e);
        }
    });


    document.getElementById('start-button').addEventListener('click', () => {
        const jd = document.getElementById('job-description').value;
        const resume = document.getElementById('resume').value;
        const limitSelect = document.getElementById('limit-select');
        const timeLimit = parseInt(limitSelect.value, 10);
        const wordLimit = parseInt(limitSelect.options[limitSelect.selectedIndex].dataset.words || '0', 10);
        sessionStorage.setItem('job_description', jd);
        sessionStorage.setItem('candidate_resume', resume);
        sessionStorage.setItem('time_limit', timeLimit);
        sessionStorage.setItem('word_limit', wordLimit);
        window.location.href = 'chat.html';
    });
    
    async function loadSessions() {
        try {
            const resp = await fetch(`${AI_SERVICE_URL}/api/v1/sessions`);
            const data = await resp.json();
            sessionsContainer.innerHTML = '';
            (data.items || []).forEach(sess => {
                const item = document.createElement('div');
                item.className = 'list-group-item d-flex justify-content-between align-items-center';
                const start = sess.start_time ? new Date(sess.start_time).toLocaleString() : '';
                item.innerHTML = `
                    <div><code>${sess.session_id}</code><br/><small>${start}</small></div>
                    <a href="${AI_SERVICE_URL}/api/v1/sessions/${sess.session_id}/report" target="_blank" class="btn btn-sm btn-outline-primary">Report</a>
                `;
                sessionsContainer.appendChild(item);
            });
        } catch (e) {
            console.error('Failed to load sessions', e);
        }
    }

    refreshBtn.addEventListener('click', loadSessions);

    // bootstrap: load sample options and sessions on page load
    loadSamples();
    loadSessions();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
