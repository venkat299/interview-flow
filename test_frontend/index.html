<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Start Interview</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container py-5">
        <div class="d-flex justify-content-end mb-3">
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="test-mode-toggle">
                <label class="form-check-label" for="test-mode-toggle">Testing Mode</label>
            </div>
        </div>
        <div class="card p-4 mx-auto" style="max-width: 900px;">
            <div class="mb-3">
                <textarea id="job-description" class="form-control" placeholder="Job description"></textarea>
            </div>
            <div class="mb-3">
                <textarea id="resume" class="form-control" placeholder="Paste your resume here"></textarea>
            </div>
            <button id="start-button" class="btn btn-primary w-100">Start Interview</button>
        </div>

        <div class="card p-4 mx-auto mt-4" style="max-width: 900px;">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h5 class="mb-0">Job Postings</h5>
                <button id="refresh-postings" class="btn btn-sm btn-outline-secondary">Refresh</button>
            </div>
            <div class="table-responsive">
                <table class="table table-sm align-middle" id="job-postings-table">
                    <thead>
                        <tr>
                            <th style="width: 80px;">ID</th>
                            <th>Title</th>
                            <th style="width: 140px;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="job-postings-tbody">
                        <tr><td colspan="3" class="text-muted">No job postings loaded</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card p-4 mx-auto mt-4" style="max-width: 900px;">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h5 class="mb-0">Past Sessions</h5>
                <button id="refresh-sessions" class="btn btn-sm btn-outline-secondary">Refresh</button>
            </div>
            <div id="sessions-container" class="list-group small"></div>
        </div>
    </div>
    <script>

    const AI_SERVICE_URL = 'http://localhost:8003';
    // Share with chat page
    try { sessionStorage.setItem('AI_SERVICE_URL', AI_SERVICE_URL); } catch (e) {}
    const postingsTbody = document.getElementById('job-postings-tbody');
    const sessionsContainer = document.getElementById('sessions-container');
    const refreshBtn = document.getElementById('refresh-sessions');
    const refreshPostingsBtn = document.getElementById('refresh-postings');
    const testToggle = document.getElementById('test-mode-toggle');
    let testingMode = false;

    testToggle.addEventListener('change', () => {
        testingMode = testToggle.checked;
    });

    async function applyJobSelection(id) {
        document.getElementById('job-description').value = '';
        document.getElementById('resume').value = '';
        if (!id) return;
        try {
            const resp = await fetch(`${AI_SERVICE_URL}/job-postings/${id}`);
            const item = await resp.json();
            const parts = [];
            if (item.description) parts.push(String(item.description).trim());
            if (Array.isArray(item.responsibilities) && item.responsibilities.length) {
                const bullets = item.responsibilities.map(r => `- ${r}`).join('\n');
                parts.push(`Responsibilities:\n${bullets}`);
            }
            if (Array.isArray(item.required_qualifications) && item.required_qualifications.length) {
                const bullets = item.required_qualifications.map(q => `- ${q}`).join('\n');
                parts.push(`Required Qualifications:\n${bullets}`);
            }
            document.getElementById('job-description').value = parts.join('\n\n');
            if (testingMode) {
                const gen = await fetch(`${AI_SERVICE_URL}/app-test/generate-candidate/${id}`, { method: 'POST' });
                const cand = await gen.json();
                if (cand.candidate_id) sessionStorage.setItem('candidate_id', cand.candidate_id);
                document.getElementById('resume').value = cand.resume || '';
            }
        } catch (e) {
            console.error('Failed to load job', e);
        }
    }

    function renderJobPostings(items) {
        if (!Array.isArray(items) || items.length === 0) {
            postingsTbody.innerHTML = '<tr><td colspan="3" class="text-muted">No job postings found</td></tr>';
            return;
        }
        postingsTbody.innerHTML = '';
        for (const item of items) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><code>${item.id}</code></td>
                <td>${item.job_title}</td>
                <td>
                    <button class="btn btn-sm btn-outline-primary" data-id="${item.id}">Select</button>
                </td>
            `;
            postingsTbody.appendChild(tr);
        }
        // Delegate click to tbody for performance
        postingsTbody.onclick = async (ev) => {
            const btn = ev.target.closest('button[data-id]');
            if (!btn) return;
            const id = btn.getAttribute('data-id');
            await applyJobSelection(id);
        };
    }

    async function loadJobPostings() {
        try {
            const resp = await fetch(`${AI_SERVICE_URL}/job-postings`);
            const data = await resp.json();
            const items = data.items || [];
            // Populate table
            renderJobPostings(items);
        } catch (e) {
            console.error('Failed to load job postings', e);
        }
    }


    document.getElementById('start-button').addEventListener('click', () => {
        const jd = document.getElementById('job-description').value;
        const resume = document.getElementById('resume').value;
        // Defaults after removing time/word dropdowns
        const timeLimit = 900; // 15 minutes
        const wordLimit = 1500; // ~1500 words
        sessionStorage.setItem('job_description', jd);
        sessionStorage.setItem('candidate_resume', resume);
        const cid = sessionStorage.getItem('candidate_id') || '';
        sessionStorage.setItem('candidate_id', cid);
        sessionStorage.setItem('time_limit', timeLimit);
        sessionStorage.setItem('word_limit', wordLimit);
        window.location.href = 'chat.html';
    });
    
    async function loadSessions() {
        try {
            const resp = await fetch(`${AI_SERVICE_URL}/api/v1/sessions`);
            const data = await resp.json();
            sessionsContainer.innerHTML = '';
            (data.items || []).forEach(sess => {
                const item = document.createElement('div');
                item.className = 'list-group-item d-flex justify-content-between align-items-center';
                const start = sess.start_time ? new Date(sess.start_time).toLocaleString() : '';
                item.innerHTML = `
                    <div><code>${sess.session_id}</code><br/><small>${start}</small></div>
                    <a href="${AI_SERVICE_URL}/api/v1/sessions/${sess.session_id}/report" target="_blank" class="btn btn-sm btn-outline-primary">Report</a>
                `;
                sessionsContainer.appendChild(item);
            });
        } catch (e) {
            console.error('Failed to load sessions', e);
        }
    }

    refreshBtn.addEventListener('click', loadSessions);
    refreshPostingsBtn.addEventListener('click', async () => {
        await loadJobPostings();
    });

    // bootstrap: load job postings and sessions on page load
    loadJobPostings();
    loadSessions();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
